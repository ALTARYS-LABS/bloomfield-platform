server:
  port: 8080

spring:
  application:
    name: bloomfield-terminal
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bloomfield}
    username: ${SPRING_DATASOURCE_USERNAME:bloomfield}
    password: ${SPRING_DATASOURCE_PASSWORD:bloomfield}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

market:
  indices:
    composite-base: 234.56
    brvm10-base: 178.23

app:
  cors:
    allowed-origins:
      - "http://localhost:5173"

logging:
  level:
    root: INFO
    com.bloomfield: DEBUG
