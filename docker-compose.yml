services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bloomfield}
      POSTGRES_USER: ${POSTGRES_USER:-bloomfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloomfield}
    # Pas de `ports:` publiés sur l'hote en staging/prod : le backend atteint
    # postgres via le DNS interne Docker (`postgres:5432`). Publier 5432 sur
    # l'hote crée une collision quand staging et prod tournent sur le même VPS
    # Coolify, et exposerait inutilement la base à l'internet public.
    # Pour un accès DB depuis la machine du dev (psql, DataGrip), voir
    # `docker-compose.override.yml` qui republie 5432 uniquement en local.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloomfield} -d ${POSTGRES_DB:-bloomfield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pour un mode infra seule (postgres uniquement) en developpement local,
  # lancer explicitement: `docker compose up -d postgres`.
  # Le backend et le frontend tournent alors nativement (./gradlew bootRun, pnpm dev).
  backend:
    build: ./backend
    restart: unless-stopped
    # Pas de `ports:` publiés sur l'hote: Traefik (Coolify) route en interne
    # sur le reseau Docker. Publier 8080 sur l'hote cree une collision en
    # staging/prod avec les autres services du serveur Coolify.
    # Pour atteindre le backend depuis la machine du developpeur, passer
    # par le frontend (proxy nginx) ou lancer `./gradlew bootRun` en natif.
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bloomfield}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bloomfield}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bloomfield}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
