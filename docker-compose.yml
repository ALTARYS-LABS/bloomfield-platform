services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bloomfield}
      POSTGRES_USER: ${POSTGRES_USER:-bloomfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloomfield}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloomfield} -d ${POSTGRES_DB:-bloomfield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend and frontend are gated behind the `app` profile.
  # The committed `.env` sets COMPOSE_PROFILES=app so the default
  # `docker compose up` behaviour (and Coolify deploys) is unchanged.
  # Local devs running the backend natively via `./gradlew bootRun`
  # can start postgres only with: `docker compose up -d postgres`.
  backend:
    build: ./backend
    profiles: ["app"]
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bloomfield}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bloomfield}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bloomfield}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    profiles: ["app"]
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
